name: Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    environment: github-actions
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v1
      with:
        python-version: 3.10.19

    - name: "Install uv"
      uses: astral-sh/setup-uv@v7

    - name: "Install project (uv)"
      shell: bash
      run: |
        uv sync --all-extras --dev

    - name: Static checks
      shell: bash
      run: |
        uv run black --check dagviz
        uv run mypy dagviz
        uv run flake8 dagviz

    - name: Build package
      shell: bash
      run: |
        uv build
        echo "::set-output name=release-file::$(cd dist && echo *.gz)"

    - name: Verify built artifact matches tag
      shell: bash
      run: |
        tag=${GITHUB_REF#refs/tags/v}
        built=$(ls dist | head -n1 || true)
        echo "Tag: $tag"
        echo "Built artifact: $built"
        if [ -z "$built" ] || [[ "$built" != *"$tag"* ]]; then
          echo "::error::Built artifact does not include tag/version ($tag)"
          exit 1
        fi
        echo "Artifact matches tag."

    - name: Build docs
      shell: bash
      run: |
        uv run pdoc -f --html -o docs dagviz --template-dir doc-template
        mkdir -p docs/notebooks
        cp notebooks/*.html docs/notebooks

    - name: Test
      shell: bash
      run: |
        uv run pytest --cov dagviz --cov-branch --cov-report xml

    - name: Deploy docs
      uses: crazy-max/ghaction-github-pages@v2
      with:
        target_branch: gh-pages
        build_dir: docs
        jekyll: false
        dry_run: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish distribution to Test PyPI
      uses: pypa/gh-action-pypi-publish@master
      with:
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository_url: https://test.pypi.org/legacy/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@master
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
